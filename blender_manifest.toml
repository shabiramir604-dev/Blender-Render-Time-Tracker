schema_version = "1.0.0"

# Extension metadata - REQUIRED FIELDS
id = "render_time_tracker"
version = "1.0.0"
name = "Render Time Tracker"
tagline = "Track render time per frame with live statistics and ETA display"
maintainer = "Developer <shabiramir604@gmail@gmail.com>"
type = "add-on"

# Optional but recommended metadata
website = "https://github.com/shabiramir604-dev/Blender-Render-Time-Tracker"
tags = ["Render", "Animation", "Pipeline", "System"]
blender_version_min = "4.2.0"

# License and copyright
license = [
    "SPDX:GPL-3.0-or-later",
]
copyright = [
    "2024 Developer Name",
]

# Permissions - REQUIRED for transparency
[permissions]
files = "Export render statistics to text files on disk"

# Build configuration
[build]
paths_exclude_pattern = [
    "__pycache__/",
    "/.git/",
    "/*.zip",
    ".vscode/",
    "*.blend",
    "*.blend1",
]
