# Render Time Tracker Configuration
# Works with Cycles, Eevee, and Workbench render engines

[display]
header_color = "#FF6B6B"
background_color = "#2C3E50"
text_color = "#FFFFFF"
progress_bar_color = "#4ECDC4"
font_size = 12

[behavior]
auto_save_stats = false
save_interval = 60
show_popup_on_complete = true
play_sound_on_complete = false
debug_logging = false

[export]
default_filename = "render_stats"
include_timestamp = true
include_scene_info = true
include_engine_info = true

[advanced]
max_history_frames = 1000
update_interval = 0.1
log_level = "INFO"
